<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Auto SL Calc</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="title-row">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
        </svg>
        <h1>Auto SL Calc</h1>
      </div>
      <p class="subtitle">Futures Stop Loss Calculator</p>
    </div>

    <div class="card">
      <div class="setting-group row-group">
        <label for="enabledToggle" class="setting-label">Enable Extension</label>
        <label class="switch">
          <input type="checkbox" id="enabledToggle">
          <span class="slider round"></span>
        </label>
      </div>

      <div class="setting-group row-group">
        <div class="label-with-tooltip">
          <label for="autoCalcMargin" class="setting-label">Auto-Calc Margin</label>
          <div class="tooltip-icon" title="Automatically calculates the required margin to maintain your risk amount based on SL distance.">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="11"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
          </div>
        </div>
        <label class="switch">
          <input type="checkbox" id="autoCalcMargin">
          <span class="slider round"></span>
        </label>
      </div>

      <div class="divider"></div>

      <div class="setting-group">
        <label for="riskPercent" class="setting-label">Risk Percentage (%)</label>
        <p class="setting-desc">Percentage of total available balance to risk.</p>
        <div class="input-wrapper">
          <input type="number" id="riskPercent" step="0.1" min="0.1" value="0.5">
          <span class="suffix">%</span>
        </div>
      </div>

      <div class="setting-group">
        <label for="minutesMemory" class="setting-label">Price Memory Window</label>
        <p class="setting-desc">Minutes to keep min/max prices in memory.</p>
        <div class="input-wrapper">
          <input type="number" id="minutesMemory" step="1" min="1" value="10">
          <span class="suffix">min</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="setting-group">
        <h2 class="qol-title"
          style="font-size: 14px; font-weight: 600; color: var(--accent-color); margin-bottom: 8px;">Site Specific QoL
        </h2>

        <div class="exchange-group">
          <h3 class="exchange-title">BingX Standard</h3>
          <div class="setting-group row-group exchange-feature">
            <div class="label-with-tooltip">
              <label for="autoSLToggle" class="setting-label">Auto-enable SL</label>
              <div class="tooltip-icon"
                title="Automatically enables Stop Loss and switches to USDT mode upon load of BingX Standard.">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="16" x2="12" y2="11"></line>
                  <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
              </div>
            </div>
            <label class="switch">
              <input type="checkbox" id="autoSLToggle">
              <span class="slider round"></span>
            </label>
          </div>
        </div>

        <div class="exchange-group" style="margin-top: 12px;">
          <h3 class="exchange-title">Blofin</h3>
          <div class="setting-group row-group exchange-feature">
            <div class="label-with-tooltip">
              <label for="autoMarketBlofin" class="setting-label">Auto Market Order</label>
              <div class="tooltip-icon" title="Automatically selects the Market order type upon loading the trading pair.">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="16" x2="12" y2="11"></line>
                  <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
              </div>
            </div>
            <label class="switch">
              <input type="checkbox" id="autoMarketBlofin">
              <span class="slider round"></span>
            </label>
          </div>

          <div class="setting-group row-group exchange-feature" style="margin-top: 8px;">
            <div class="label-with-tooltip">
              <label for="autoTPSLBlofin" class="setting-label">Auto Enable TP/SL</label>
              <div class="tooltip-icon" title="Automatically checks the TP/SL box upon loading the trading pair.">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="16" x2="12" y2="11"></line>
                  <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
              </div>
            </div>
            <label class="switch">
              <input type="checkbox" id="autoTPSLBlofin">
              <span class="slider round"></span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <button id="saveBtn" class="primary-btn">Save Settings</button>
    <div id="statusMsg" class="status-msg"></div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
